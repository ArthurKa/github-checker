server {
  listen 80 default_server reuseport;
  listen [::]:80 default_server reuseport;

  location '/.well-known/acme-challenge' {
    default_type "text/plain";
    root /var/www/letsencrypt;
  }

  include conf.d/config_raw-ip-redirect.nginx;

  location / {
    return 301 https://$http_host$request_uri;
  }
}
